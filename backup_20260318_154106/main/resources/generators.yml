# ==========================================
# BentoGens Generator Configurations
# Compatible with NextGens format
# HEX COLORS SUPPORTED: &#RRGGBB
# ==========================================

coal_gens:
  display-name: "&#3C3C3C⛏ Coal Generator"
  interval: 50  # seconds
  
  # Block material
  material: COAL_ORE
  
  # Upgrade settings
  upgrade:
    enabled: true
    next-tier: iron_gens
    cost: 1500.0
  
  # Shop item configuration
  item:
    material: COAL_ORE
    amount: 1
    display-name: "&#3C3C3C&l⛏ COAL GENERATOR"
    lore:
      - "&8Tier I — Basic Mineral"
      - ""
      - "&#D8A073&l✨ STATISTIK GEN"
      - " &8• &fSpeed: &b50s"
      - " &8• &fYield: &eCoal Chunk"
      - ""
      - "&#84fab0&l💰 EKONOMI"
      - " &8• &fNext Upgrade: &a●1,500"
      - ""
      - "&8&oPlace to begin your journey..."
  
  # Drops configuration
  drops:
    coal_chunk:
      chance: 100
      value: 1.0
      item:
        material: BLACK_DYE
        amount: 1
        display-name: "&#3C3C3CCoal Chunk"
        lore:
          - "&7Market Value: &a●1"
          - ""
          - "&#ff7f17&l⚡ Raw Material"

