# MySQL Database Configuration
database:
  type: MYSQL  # MYSQL or SQLITE
  mysql:
    host: 185.207.166.148
    port: 1025
    database: s1790_gens
    user: u1790_Lnrcd25JNV
    password: O^ue2gT^vlvAT3^8mbvyxtu+
    useSSL: false

# Generator Settings
generators:
  # Should generators work only when owner is online?
  online-only: true
  
  # Default max generators per player
  default-max: 10
  
  # Force restore blocks on server restart (BUG FIX!)
  force-restore-blocks: true
  
  # Restore generator blocks when chunk loads
  restore-on-chunk-load: true
  
  # Anti-explosion protection
  anti-explosion: true
  
  # Prevent placing item drops as blocks
  disable-drop-place: true
  
  # Should we drop generator item on break?
  drop-on-break: false

# BentoBox Island Integration
bentobox:
  enabled: true
  
  # Return generators when player leaves island
  return-on-leave: true
  
  # Remove generators when island deleted
  remove-on-delete: true
  
  # Clear generators on island reset
  clear-on-reset: true
  
  # Only allow placement on own island
  require-own-island: true

# Sounds & Effects
sounds:
  generator-place:
    enabled: true
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 2.0
  
  generator-break:
    enabled: true
    sound: ENTITY_ITEM_PICKUP
    volume: 1.0
    pitch: 1.0
  
  # Sound when generator drops item
  generator-drop:
    enabled: true
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.5
    pitch: 1.5

# Particles
particles:
  generator-place: true
  generator-break: true
  generator-working: false

# Messages
messages:
  prefix: '&6[BentoGens]'
  
  # General
  no-permission: '{prefix} &cNo permission!'
  not-owner: '{prefix} &cYou don''t own this generator!'
  reload-success: '{prefix} &aConfiguration reloaded!'
  
  # Generator Actions
  generator-placed: '{prefix} &aGenerator placed! &7({current}/{max})'
  generator-removed: '{prefix} &cGenerator removed!'
  max-generators: '{prefix} &cMax generators reached! &7({max})'
  
  # Island Checks
  not-on-island: '{prefix} &cYou must be on your island!'
  not-your-island: '{prefix} &cThis is not your island!'
  
  # Admin
  give-gen: '{prefix} &aYou gave &e{amount}x {type} &ato &e{player}'
  receive-gen: '{prefix} &aYou received &e{amount}x {type}&a!'
  
  # Events
  generators-returned: '{prefix} &aYour &e{amount} &agenerators have been returned!'
  
  # Help
  help-normal:
  - '&6&lBentoGens &7- Generator Plugin'
  - '&6/bentogens help &7- Show this help'
  - '&6/bentogens info &7- Show plugin info'
  
  help-admin:
  - '&6&lBentoGens Admin Commands'
  - '&6/bentogens reload &7- Reload configuration'
  - '&6/bentogens give <player> <type> [amount] &7- Give generator'
  - '&6/bentogens restore &7- Restore all generator blocks'

