messages:
  prefix: '&6[SeriaGens]'
  no-permission: '{prefix} &cMaaf, kamu tidak memiliki izin untuk melakukan ini!'
  plugin-reloaded: '{prefix} &aKonfigurasi dan data plugin berhasil dimuat ulang!'
  player-not-found: '{prefix} &cPemain tersebut tidak ditemukan atau sedang offline!'
  invalid-generator: '{prefix} &cTipe generator tidak valid! Cek generators.yml.'
  generator-given: '{prefix} &aBerhasil memberikan &e{amount} &agenerator kepada &e{player}!'
  max-generators: '{prefix} &cKamu telah mencapai batas maksimal &e{max} &cgenerator!'
  generator-placed: '{prefix} &aGenerator berhasil diletakkan! &7({current}/{max})'
  generator-removed: '{prefix} &cGenerator berhasil dibongkar!'
  economy-disabled: '{prefix} &cSistem ekonomi (Vault) sedang tidak aktif di server!'
  generator-repaired: '{prefix} &aGenerator berhasil diperbaiki dengan biaya &a●{cost}!'
  generators-returned: '{prefix} &aSebanyak &e{amount} &agenerator telah dikembalikan ke inventory-mu!'
  
  # Pesan Interaksi Generator
  generator-not-yours: '{prefix} &cIni bukan aset mesin milikmu!'
  generator-island-only: '{prefix} &cMesin hanya bisa dipasang di pulaumu sendiri!'
  generator-corrupted-break: '{prefix} &c&l⚠ &cMesin sedang rusak! Perbaiki dulu sebelum dibongkar.'
  generator-corrupted-interact: '{prefix} &c&l⚠ &cMesin rusak tidak bisa dicabut! Klik Kanan untuk repair.'
  inventory-full-drop: '{prefix} &e&l⚠ &fInventory penuh! Mesin dijatuhkan ke tanah.'
  
  # Pesan Sell Wand
  sellwand-no-permission: '{prefix} &cKamu tidak memiliki izin menggunakan Sell Wand!'
  sellwand-not-container: '{prefix} &cHanya bisa digunakan pada Chest/Barrel/Hopper!'
  sellwand-broken: '{prefix} &cSell Wand ini sudah rusak/habis!'
  sellwand-no-items: '{prefix} &cTidak ada hasil mesin yang bisa dijual di sini.'
  sellwand-sell-success: '{prefix} &aBerhasil menjual &e{items} item &aseharga &e●{value} &7({multiplier}x)'
  sellwand-broke-notify: '{prefix} &c&l⚠ &cSell Wand milikmu telah hancur!'
  
  help-normal:
  - '&6&lSeriaGens &7- Sistem Aset'
  - '&6/sgens help &7- Menampilkan bantuan ini'
  - '&6/genset &7- Buka Panel Manajemen Aset'
  - '&6/gensell &7- Jual semua hasil produksi'
  - '&7'
  - '&e&lTip: &7Klik Kiri untuk pickup cepat, Klik Kanan untuk Upgrade/Repair!'
  
  help-admin:
  - '&6&lSeriaGens Admin Commands'
  - '&6/sgens reload &7- Memuat ulang konfigurasi'
  - '&6/sgens give <pemain> <tipe> [jumlah] &7- Berikan generator'
  - '&6/sgens sellwand <pemain> [multiplier] [uses] &7- Berikan Sell Wand'
  - '&6/sgens view <pemain> &7- Buka CCTV Panel Aset Pemain'
  - '&6/sgens addslot <pemain> <jumlah> &7- Tambah limit slot pemain'
  - '&6/sgens pickup <pemain> &7- Ambil semua gen pemain secara paksa'
  - '&6/sgens restore &7- Pulihkan blok generator yang hilang'
  - '&6/event start <id> &7- Memulai event global'