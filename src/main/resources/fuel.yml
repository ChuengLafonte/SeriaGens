# ==========================================
#         SERIAGENS FUEL SYSTEM
# ==========================================

fuels:
  COAL:
    joules-per-item: 1
    burn-time: 10 # Waktu (dalam detik) 1 item bertahan sebelum hangus/berkurang
  CHARCOAL:
    joules-per-item: 1
    burn-time: 10
  COAL_BLOCK:
    joules-per-item: 9
    burn-time: 90
  LAVA_BUCKET:
    joules-per-item: 100
    burn-time: 1000

global-fuel:
  default-base-limit: 1000 # Limit Joule Garden terendah (Tanpa Rank Permission)
  overcapacity-alarm: true
  
slots:
  # Slot 1 terbuka secara default
  1:
    locked-item:
      material: RED_STAINED_GLASS_PANE
      name: "&c&lSLOT TERKUNCI"
      lore:
        - "&7Syarat untuk membuka:"
        - "&c- Tidak ada, ini default"
    empty-item:
      material: YELLOW_STAINED_GLASS_PANE
      name: "&e&lSLOT FUEL KOSONG"
      lore:
        - "&7Tarik (Drag & Drop) bahan bakar ke sini!"
    requirements: []

  # Slot 2 terbuka jika punya uang 5000
  2:
    locked-item:
      material: RED_STAINED_GLASS_PANE
      name: "&c&lSLOT TERKUNCI (SLOT 2)"
      lore:
        - "&7Syarat untuk membuka:"
        - "&c- Saldo: $5,000"
        - "&eKlik untuk membuka!"
    empty-item:
      material: YELLOW_STAINED_GLASS_PANE
      name: "&e&lSLOT FUEL KOSONG"
      lore:
        - "&7Tarik (Drag & Drop) bahan bakar ke sini!"
    requirements:
      '0':
        type: MONEY
        amount: 5000
        message: "&cKamu butuh $5,000 untuk membuka slot ini!"
  
  # Lanjutkan untuk slot 3, 4, dan 5 sesuai kebutuhan...