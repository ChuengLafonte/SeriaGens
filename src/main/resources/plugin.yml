name: SeriaGens
version: 1.1.0
main: id.seria.gens.SeriaGens
api-version: 1.21
author: YourName
description: Generator plugin for Project Seria with sell system

# CRITICAL: Load AFTER BentoBox!
depend:
  - BentoBox
  - Vault

softdepend:
  - Essentials
  - PlaceholderAPI
  - ShopGUIPlus
  - FancyHolograms

commands:
  seriagens:
    description: Main SeriaGens command
    usage: /<command> [args]
    aliases: [sgens, gen]
  
  genshop:
    description: Open generator shop
    usage: /<command>
    aliases: [gshop, generatorshop]
  
  genset:
    description: Manage your generators
    usage: /<command>
    aliases: [generators, mygens]
  
  gensell:
    description: Sell generator items from inventory
    usage: /<command>
    aliases: [gsell]
  
  event:
    description: Manage generator events
    usage: /<command> <start|stop|list|info> [eventid]
    aliases: [events, genevent]

permissions:
  seriagens.admin:
    description: Admin access to all features
    default: op
    children:
      seriagens.reload: true
      seriagens.give: true
      seriagens.restore: true
  
  seriagens.reload:
    description: Reload plugin
    default: op
  
  seriagens.give:
    description: Give generators and items
    default: op
  
  seriagens.restore:
    description: Restore generator blocks
    default: op
  
  seriagens.shop:
    description: Access generator shop
    default: true
  
  seriagens.place:
    description: Place generators
    default: true
  
  seriagens.break:
    description: Break generators
    default: true
  
  seriagens.genset:
    description: Use /genset command
    default: true
  
  seriagens.wand:
    description: Use sell wand
    default: true
  
  seriagens.sell:
    description: Use /gensell command
    default: true
  
  seriagens.max.10:
    description: Max 10 generators
    default: true
  
  seriagens.max.20:
    description: Max 20 generators
    default: false
  
  seriagens.max.50:
    description: Max 50 generators
    default: false
  
  seriagens.max.100:
    description: Max 100 generators
    default: false
  
  seriagens.max.unlimited:
    description: Unlimited generators
    default: false