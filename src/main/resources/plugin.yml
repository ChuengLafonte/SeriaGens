name: BentoGens
version: 1.0.0
main: com.yourserver.bentogens.BentoGens
api-version: 1.21
author: YourName
description: Generator plugin for BentoBox with sell system

# CRITICAL: Load AFTER BentoBox!
depend:
  - BentoBox
  - Vault

softdepend:
  - Essentials
  - PlaceholderAPI
  - ShopGUIPlus
  - FancyHolograms

commands:
  bentogens:
    description: Main BentoGens command
    usage: /<command> [args]
    aliases: [bgens, gen]
  
  genshop:
    description: Open generator shop
    usage: /<command>
    aliases: [gshop, generatorshop]
  
  genset:
    description: Manage your generators
    usage: /<command>
    aliases: [generators, mygens]
  
  gensell:
    description: Sell generator items from inventory
    usage: /<command>
    aliases: [gsell]
  
  event:
    description: Manage generator events
    usage: /<command> <start|stop|list|info> [eventid]
    aliases: [events, genevent]

# NO /sell COMMAND - Avoid conflict with ShopGUIPlus!

permissions:
  bentogens.admin:
    description: Admin access to all features
    default: op
    children:
      bentogens.reload: true
      bentogens.give: true
      bentogens.restore: true
  
  bentogens.reload:
    description: Reload plugin
    default: op
  
  bentogens.give:
    description: Give generators and items
    default: op
  
  bentogens.restore:
    description: Restore generator blocks
    default: op
  
  bentogens.shop:
    description: Access generator shop
    default: true
  
  bentogens.place:
    description: Place generators
    default: true
  
  bentogens.break:
    description: Break generators
    default: true
  
  bentogens.genset:
    description: Use /genset command
    default: true
  
  bentogens.wand:
    description: Use sell wand
    default: true
  
  bentogens.sell:
    description: Use /gensell command
    default: true
  
  bentogens.max.10:
    description: Max 10 generators
    default: true
  
  bentogens.max.20:
    description: Max 20 generators
    default: false
  
  bentogens.max.50:
    description: Max 50 generators
    default: false
  
  bentogens.max.100:
    description: Max 100 generators
    default: false
  
  bentogens.max.unlimited:
    description: Unlimited generators
    default: false