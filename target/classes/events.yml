# ==========================================
#         BENTOGENS EVENTS SYSTEM
# ==========================================
# Event Types:
#   - sell_multiplier: Increase sell price
#   - drop_multiplier: Increase item drops
#   - generator_speed: Faster generation
#   - generator_upgrade: Temporary tier boost
#   - mixed_up: Random drops from other gens
# ==========================================

settings:
