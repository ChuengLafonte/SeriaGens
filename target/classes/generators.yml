# ==========================================
# BentoGens - Generators Configuration
# 11 GENERATOR TIERS WITH CORRUPTION SYSTEM
# ==========================================

# Tier 1: Coal Generator
coal_gens:
  display-name: "#FFFFFFCoal Generator"
  material: COAL_BLOCK
  interval: 50  # seconds
  
  # Corruption settings
  corruption:
    enabled: true
    cost: 50.0      # Repair cost
    chance: 5.0     # 5% chance to corrupt
  
  # Upgrade settings
  upgrade:
    enabled: true
    next-tier: iron_gens
    cost: 1500.0
  
  # Generator item
  item:
    material: COAL_BLOCK
    display-name: "#FFFFFFCoal Generator"
    lore:
      - "&7Generate coal every 50 seconds"
      - "&7Value: &a$1 &7per drop"
      - ""
      - "&eUpgrade Cost: &a$1,500"
      - "&cRepair Cost: &c$50"
      - ""
      - "&7&oPlace on your island to activate"
  
  # Possible drops
  drops:
    coal:
      chance: 100
      sell-value: 1.0
      item:
        material: COAL
        display-name: "&fCoal &7(Value: &a$1&7)"
        lore:
          - "&7Generator drop"
          - "&aUse /sell to sell"

