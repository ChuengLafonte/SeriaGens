name: BentoGens
version: 1.0.0
main: com.yourserver.bentogens.BentoGens
api-version: '1.21'
author: YourServer
description: Advanced Generator Plugin with Corruption System & GUI

# Dependencies
softdepend:
  - BentoBox
  - Vault

# Commands
commands:
  bentogens:
    description: Main BentoGens command
    usage: /bentogens [help|info|reload|give|restore]
    aliases: [bgens, bg, gens]
  
  genshop:
    description: Open generator shop
    usage: /genshop
    aliases: [bgshop, generatorshop]
    permission: bentogens.shop
  
  genset:
    description: Manage your generators
    usage: /genset
    aliases: [gensettings, generatormanage, genmanage]
    permission: bentogens.genset

# Permissions
permissions:
  bentogens.admin:
    description: Admin permission for all commands
    default: op
    children:
      bentogens.use: true
      bentogens.shop: true
      bentogens.genset: true
      bentogens.max.unlimited: true
  
  bentogens.use:
    description: Use generators
    default: true
  
  bentogens.shop:
    description: Access generator shop
    default: true
  
  bentogens.genset:
    description: Access generator management GUI
    default: true
  
  # Max generator permissions
  bentogens.max.10:
    description: Max 10 generators
    default: true
  
  bentogens.max.25:
    description: Max 25 generators
    default: false
  
  bentogens.max.50:
    description: Max 50 generators
    default: false
  
  bentogens.max.100:
    description: Max 100 generators
    default: false
  
  bentogens.max.unlimited:
    description: Unlimited generators
    default: false